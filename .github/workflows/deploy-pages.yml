name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        env:
          VITE_BASE_PATH: /FamilyGallery/
        run: npm run build

      - name: Add SPA fallback file
        shell: bash
        run: |
          if [ -f dist/client/index.html ]; then
            cp dist/client/index.html dist/client/404.html
          else
            echo "dist/client/index.html not found; generating static entry file"
            CSS_FILE="$(basename "$(ls dist/client/assets/styles-*.css | head -n 1)")"
            JS_FILES="$(ls dist/client/assets/index-*.js | xargs -n 1 basename)"
            {
              echo '<!doctype html>'
              echo '<html lang="en">'
              echo '  <head>'
              echo '    <meta charset="UTF-8" />'
              echo '    <meta name="viewport" content="width=device-width, initial-scale=1.0" />'
              echo '    <title>Family Gallery</title>'
              echo "    <link rel=\"stylesheet\" href=\"./assets/${CSS_FILE}\" />"
              echo '  </head>'
              echo '  <body>'
              for f in ${JS_FILES}; do
                echo "    <script type=\"module\" src=\"./assets/${f}\"></script>"
              done
              echo '  </body>'
              echo '</html>'
            } > dist/client/index.html
            cp dist/client/index.html dist/client/404.html
          fi

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/client
          force_orphan: true
